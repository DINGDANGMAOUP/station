---
# Station ConfigMap for Cluster Mode
apiVersion: v1
kind: ConfigMap
metadata:
  name: station-config-cluster
  namespace: station
  labels:
    app: station
    redis-mode: cluster
data:
  STATION_REDIS_MODE: "cluster"
  STATION_REDIS_CLUSTER_NODES: "redis-cluster-0.redis-cluster.station.svc.cluster.local:6379,redis-cluster-1.redis-cluster.station.svc.cluster.local:6379,redis-cluster-2.redis-cluster.station.svc.cluster.local:6379,redis-cluster-3.redis-cluster.station.svc.cluster.local:6379,redis-cluster-4.redis-cluster.station.svc.cluster.local:6379,redis-cluster-5.redis-cluster.station.svc.cluster.local:6379"
  STATION_DISCOVERY_TYPE: "kubernetes"
  STATION_K8S_LABEL_SELECTOR: "app=station,redis-mode=cluster"
  KUBERNETES_NAMESPACE: "station"
  STATION_STORAGE_PATH: "/data/station"
  STATION_HTTP_PORT: "5000"
