---
# Station ConfigMap for Sentinel Mode
apiVersion: v1
kind: ConfigMap
metadata:
  name: station-config-sentinel
  namespace: station
  labels:
    app: station
    redis-mode: sentinel
data:
  STATION_REDIS_MODE: "sentinel"
  STATION_REDIS_SENTINEL_MASTER: "mymaster"
  STATION_REDIS_SENTINEL_NODES: "redis-sentinel-0.redis-sentinel.station.svc.cluster.local:26379,redis-sentinel-1.redis-sentinel.station.svc.cluster.local:26379,redis-sentinel-2.redis-sentinel.station.svc.cluster.local:26379"
  STATION_DISCOVERY_TYPE: "kubernetes"
  STATION_K8S_LABEL_SELECTOR: "app=station,redis-mode=sentinel"
  KUBERNETES_NAMESPACE: "station"
  STATION_STORAGE_PATH: "/data/station"
  STATION_HTTP_PORT: "5000"
