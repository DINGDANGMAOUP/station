version: '3.8'

services:
  # Redis standalone for distributed caching
  redis:
    image: redis:7-alpine
    container_name: station-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - station-network

  # Station node 1
  station-1:
    build: ..
    container_name: station-node-1
    hostname: station-node-1
    environment:
      - HOSTNAME=station-node-1
      - STATION_NODE_ID=node-1
      - STATION_HTTP_PORT=5000
      - STATION_REDIS_MODE=standalone
      - STATION_REDIS_HOST=redis
      - STATION_REDIS_PORT=6379
      - STATION_REDIS_PASSWORD=
      - STATION_DISCOVERY_TYPE=redis
      - STATION_STORAGE_PATH=/data/station
      - JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "5001:5000"
      - "50051:50051"
    volumes:
      - station-1-data:/data/station
    networks:
      - station-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Station node 2
  station-2:
    build: ..
    container_name: station-node-2
    hostname: station-node-2
    environment:
      - HOSTNAME=station-node-2
      - STATION_NODE_ID=node-2
      - STATION_HTTP_PORT=5000
      - STATION_REDIS_MODE=standalone
      - STATION_REDIS_HOST=redis
      - STATION_REDIS_PORT=6379
      - STATION_REDIS_PASSWORD=
      - STATION_DISCOVERY_TYPE=redis
      - STATION_STORAGE_PATH=/data/station
      - JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "5002:5000"
      - "50052:50051"
    volumes:
      - station-2-data:/data/station
    networks:
      - station-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Station node 3
  station-3:
    build: ..
    container_name: station-node-3
    hostname: station-node-3
    environment:
      - HOSTNAME=station-node-3
      - STATION_NODE_ID=node-3
      - STATION_HTTP_PORT=5000
      - STATION_REDIS_MODE=standalone
      - STATION_REDIS_HOST=redis
      - STATION_REDIS_PORT=6379
      - STATION_REDIS_PASSWORD=
      - STATION_DISCOVERY_TYPE=redis
      - STATION_STORAGE_PATH=/data/station
      - JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "5003:5000"
      - "50053:50051"
    volumes:
      - station-3-data:/data/station
    networks:
      - station-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    container_name: station-nginx
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - station-network
    depends_on:
      - station-1
      - station-2
      - station-3

volumes:
  redis-data:
  station-1-data:
  station-2-data:
  station-3-data:

networks:
  station-network:
    driver: bridge
