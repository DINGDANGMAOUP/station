version: '3.8'

services:
  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: >
      redis-server
      --appendonly yes
      --masterauth redis123
      --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - station-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Replica 1
  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    command: >
      redis-server
      --appendonly yes
      --replicaof redis-master 6379
      --masterauth redis123
      --requirepass redis123
    ports:
      - "6380:6379"
    volumes:
      - redis-replica-1-data:/data
    networks:
      - station-network
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Replica 2
  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    command: >
      redis-server
      --appendonly yes
      --replicaof redis-master 6379
      --masterauth redis123
      --requirepass redis123
    ports:
      - "6381:6379"
    volumes:
      - redis-replica-2-data:/data
    networks:
      - station-network
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Sentinel 1
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    command:
      - sh
      - -c
      - |
        sleep 5
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor mymaster redis-master 6379 2
        sentinel auth-pass mymaster redis123
        sentinel down-after-milliseconds mymaster 5000
        sentinel parallel-syncs mymaster 1
        sentinel failover-timeout mymaster 10000
        EOF
        redis-sentinel /tmp/sentinel.conf
    ports:
      - "26379:26379"
    networks:
      - station-network
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    restart: on-failure

  # Redis Sentinel 2
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    command:
      - sh
      - -c
      - |
        sleep 5
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor mymaster redis-master 6379 2
        sentinel auth-pass mymaster redis123
        sentinel down-after-milliseconds mymaster 5000
        sentinel parallel-syncs mymaster 1
        sentinel failover-timeout mymaster 10000
        EOF
        redis-sentinel /tmp/sentinel.conf
    ports:
      - "26380:26379"
    networks:
      - station-network
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    restart: on-failure

  # Redis Sentinel 3
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    command:
      - sh
      - -c
      - |
        sleep 5
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor mymaster redis-master 6379 2
        sentinel auth-pass mymaster redis123
        sentinel down-after-milliseconds mymaster 5000
        sentinel parallel-syncs mymaster 1
        sentinel failover-timeout mymaster 10000
        EOF
        redis-sentinel /tmp/sentinel.conf
    ports:
      - "26381:26379"
    networks:
      - station-network
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    restart: on-failure

  # Station node 1
  station-1:
    build: ..
    container_name: station-node-1
    hostname: station-node-1
    environment:
      - HOSTNAME=station-node-1
      - STATION_NODE_ID=node-1
      - STATION_HTTP_PORT=5000
      - STATION_REDIS_MODE=sentinel
      - STATION_REDIS_PASSWORD=redis123
      - STATION_REDIS_SENTINEL_MASTER=mymaster
      - STATION_REDIS_SENTINEL_NODES=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - STATION_DISCOVERY_TYPE=redis
      - STATION_STORAGE_PATH=/data/station
      - JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "5001:5000"
      - "50051:50051"
    volumes:
      - station-1-data:/data/station
    networks:
      - station-network
    depends_on:
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # Station node 2
  station-2:
    build: ..
    container_name: station-node-2
    hostname: station-node-2
    environment:
      - HOSTNAME=station-node-2
      - STATION_NODE_ID=node-2
      - STATION_HTTP_PORT=5000
      - STATION_REDIS_MODE=sentinel
      - STATION_REDIS_PASSWORD=redis123
      - STATION_REDIS_SENTINEL_MASTER=mymaster
      - STATION_REDIS_SENTINEL_NODES=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - STATION_DISCOVERY_TYPE=redis
      - STATION_STORAGE_PATH=/data/station
      - JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "5002:5000"
      - "50052:50051"
    volumes:
      - station-2-data:/data/station
    networks:
      - station-network
    depends_on:
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # Station node 3
  station-3:
    build: ..
    container_name: station-node-3
    hostname: station-node-3
    environment:
      - HOSTNAME=station-node-3
      - STATION_NODE_ID=node-3
      - STATION_HTTP_PORT=5000
      - STATION_REDIS_MODE=sentinel
      - STATION_REDIS_PASSWORD=redis123
      - STATION_REDIS_SENTINEL_MASTER=mymaster
      - STATION_REDIS_SENTINEL_NODES=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - STATION_DISCOVERY_TYPE=redis
      - STATION_STORAGE_PATH=/data/station
      - JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "5003:5000"
      - "50053:50051"
    volumes:
      - station-3-data:/data/station
    networks:
      - station-network
    depends_on:
      - redis-sentinel-1
      - redis-sentinel-2
      - redis-sentinel-3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    container_name: station-nginx
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - station-network
    depends_on:
      - station-1
      - station-2
      - station-3

volumes:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  station-1-data:
  station-2-data:
  station-3-data:

networks:
  station-network:
    driver: bridge
